name: Auto Merge auto-bot → main

on:
  push:
    branches:
      - auto-bot
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge-to-main:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: ⚙️ Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: 🔀 Merge auto-bot into main
        run: |
          git checkout main
          git merge origin/auto-bot --no-edit
          git push origin main
