name: Auto Commit Bot

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: 📝 Make change
        run: |
          echo "Updated at $(date)" >> daemon.txt

      - name: ⚙️ Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: 📦 Commit
        run: |
          git add .
          git commit -m "Auto commit $(date)" || echo "No changes"

      - name: 🚀 Push
        run: |
          git push origin HEAD:main