name: Auto Commit Bot

on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    # 🔥 Prevent infinite loop
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: 📝 Make change
        run: |
          echo "Updated at $(date)" >> daemon.txt

      - name: ⚙️ Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: 📦 Smart Commit
        run: |
          git add .
          git diff --cached --quiet || git commit -m "chore: automated update $(date)"

      - name: 🚀 Push
        run: |
          git push origin HEAD:auto-bot