name: Auto Commit Bot

on:
  schedule:
    - cron: "0 0,5,10,15,20 * * *"    # every 2.5 hours (full hours)
    - cron: "30 2,7,12,17,22 * * *"   # every 2.5 hours (half hours)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          ref: auto-bot
          fetch-depth: 0
          persist-credentials: true

      - name: 📝 Make change
        run: |
          echo "Updated at $(date)" >> daemon.txt

      - name: ⚙️ Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: 📦 Smart Commit
        run: |
          git add .
          git diff --cached --quiet || git commit -m "chore: automated update $(date)"

      - name: 🚀 Push to auto-bot
        run: |
          git push origin HEAD:auto-bot

      - name: 📤 Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: auto-commit
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4